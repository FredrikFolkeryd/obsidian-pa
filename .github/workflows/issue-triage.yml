name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage:
    name: Triage new issue
    runs-on: ubuntu-latest

    steps:
      - name: Add triage label and comment
        uses: actions/github-script@v7
        with:
          script: |
            // Add triage label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['triage']
            });

            // Post triage comment
            const body = [
              '👋 Thanks for opening this issue!',
              '',
              '**Triage status**: 🔍 Pending review',
              '',
              'This issue has been flagged for triage by @FredrikFolkeryd.',
              '',
              '**Labels applied**: `triage`',
              '',
              '---',
              '_Automated by the issue triage workflow._'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
