name: Create Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'pre-release'
        type: choice
        options:
          - pre-release
          - release
      version_override:
        description: 'Version override (leave empty for auto-increment)'
        required: false
        type: string

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  authorize:
    name: Authorize Release
    runs-on: ubuntu-latest
    # Only repository admins and maintainers can trigger this
    # Uses environment protection rules for additional security
    environment: ${{ inputs.release_type == 'release' && 'production' || 'staging' }}
    steps:
      - name: Check permissions
        uses: actions/github-script@v7
        with:
          script: |
            const { data: permissionLevel } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor
            });
            
            const allowed = ['admin', 'maintain'].includes(permissionLevel.permission);
            if (!allowed) {
              core.setFailed(`User ${context.actor} does not have permission to create releases. Required: admin or maintain, got: ${permissionLevel.permission}`);
            }
            
            core.info(`✅ User ${context.actor} authorized with permission: ${permissionLevel.permission}`);

  compute-version:
    name: Compute Version
    runs-on: ubuntu-latest
    needs: authorize
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest release tag
        id: latest
        run: |
          # Get the latest release tag (not pre-release for full releases)
          if [ "${{ inputs.release_type }}" == "release" ]; then
            LATEST=$(git tag -l --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || echo "")
          else
            LATEST=$(git tag -l --sort=-v:refname | head -n1 || echo "")
          fi
          
          if [ -z "$LATEST" ]; then
            echo "No previous release found, starting from 0.0.0"
            LATEST="0.0.0"
          fi
          
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "📌 Latest release: $LATEST"

      - name: Compute next version from commits
        id: version
        run: |
          if [ -n "${{ inputs.version_override }}" ]; then
            VERSION="${{ inputs.version_override }}"
            echo "📝 Using override version: $VERSION"
          else
            LATEST="${{ steps.latest.outputs.latest }}"
            
            # Strip any pre-release suffix for base version
            BASE_VERSION=$(echo "$LATEST" | sed 's/-.*$//')
            
            # Parse current version
            MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
            MINOR=$(echo "$BASE_VERSION" | cut -d. -f2)
            PATCH=$(echo "$BASE_VERSION" | cut -d. -f3)
            
            # Analyze commits since last release
            if [ "$LATEST" == "0.0.0" ]; then
              COMMITS=$(git log --oneline --format="%s")
            else
              COMMITS=$(git log "$LATEST"..HEAD --oneline --format="%s")
            fi
            
            echo "📋 Commits since $LATEST:"
            echo "$COMMITS"
            
            # Determine bump type from conventional commits
            BUMP="patch"
            
            if echo "$COMMITS" | grep -qE "^feat(\(.+\))?!:|^fix(\(.+\))?!:|^refactor(\(.+\))?!:|BREAKING CHANGE"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
              BUMP="minor"
            elif echo "$COMMITS" | grep -qE "^fix(\(.+\))?:|^perf(\(.+\))?:"; then
              BUMP="patch"
            fi
            
            echo "📈 Bump type: $BUMP"
            
            # Apply bump
            case $BUMP in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac
            
            VERSION="$MAJOR.$MINOR.$PATCH"
            
            # Add pre-release suffix if not a full release
            if [ "${{ inputs.release_type }}" == "pre-release" ]; then
              # Count pre-releases for this version
              PRERELEASE_COUNT=$(git tag -l "${VERSION}-alpha.*" | wc -l | tr -d ' ')
              VERSION="${VERSION}-alpha.$((PRERELEASE_COUNT + 1))"
            fi
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "🏷️ Next version: $VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          LATEST="${{ steps.latest.outputs.latest }}"
          
          if [ "$LATEST" == "0.0.0" ]; then
            COMMITS=$(git log --oneline --format="- %s")
          else
            COMMITS=$(git log "$LATEST"..HEAD --oneline --format="- %s")
          fi
          
          # Group by type
          FEATURES=$(echo "$COMMITS" | grep -E "^- feat" | sed 's/^- feat(\([^)]*\)): /- **\1**: /' | sed 's/^- feat: /- /' || true)
          FIXES=$(echo "$COMMITS" | grep -E "^- fix" | sed 's/^- fix(\([^)]*\)): /- **\1**: /' | sed 's/^- fix: /- /' || true)
          DOCS=$(echo "$COMMITS" | grep -E "^- docs" | sed 's/^- docs(\([^)]*\)): /- **\1**: /' | sed 's/^- docs: /- /' || true)
          OTHER=$(echo "$COMMITS" | grep -vE "^- (feat|fix|docs)" || true)
          
          CHANGELOG=""
          
          if [ -n "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}### ✨ Features\n${FEATURES}\n\n"
          fi
          
          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}### 🐛 Bug Fixes\n${FIXES}\n\n"
          fi
          
          if [ -n "$DOCS" ]; then
            CHANGELOG="${CHANGELOG}### 📚 Documentation\n${DOCS}\n\n"
          fi
          
          if [ -n "$OTHER" ]; then
            CHANGELOG="${CHANGELOG}### 🔧 Other Changes\n${OTHER}\n\n"
          fi
          
          # Escape for GitHub Actions
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          CHANGELOG="${CHANGELOG//$'\r'/'%0D'}"
          
          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT

  check-release-criteria:
    name: Check Release Criteria
    runs-on: ubuntu-latest
    needs: compute-version
    if: inputs.release_type == 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Check test coverage
        run: npm run test:coverage
        continue-on-error: true

      - name: Verify no TODO/FIXME in release
        run: |
          echo "🔍 Checking for TODO/FIXME comments..."
          ISSUES=$(grep -rn "TODO\|FIXME" src/ --include="*.ts" || true)
          if [ -n "$ISSUES" ]; then
            echo "⚠️ Found TODO/FIXME comments (non-blocking):"
            echo "$ISSUES"
          else
            echo "✅ No TODO/FIXME comments found"
          fi

      - name: Verify documentation exists
        run: |
          echo "📚 Checking documentation..."
          
          if [ ! -f "README.md" ]; then
            echo "❌ README.md is required for release"
            exit 1
          fi
          
          echo "✅ README.md exists"

      - name: Check for security advisories
        run: |
          echo "🔒 Checking for known vulnerabilities..."
          npm audit --audit-level=high || {
            echo "⚠️ High severity vulnerabilities found. Review before release."
            # Don't fail - just warn
          }

      - name: Generate release criteria artifact
        run: |
          mkdir -p release-criteria
          
          cat > release-criteria/report.md << 'EOF'
          # Release Criteria Report
          
          **Version:** ${{ needs.compute-version.outputs.version }}
          **Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Actor:** ${{ github.actor }}
          
          ## Checks Performed
          
          - [x] Lint passed
          - [x] Tests passed
          - [x] README.md exists
          - [x] Security audit reviewed
          
          ## Approval
          
          This release was approved by: ${{ github.actor }}
          EOF
          
          echo "✅ Release criteria report generated"

      - name: Upload release criteria
        uses: actions/upload-artifact@v4
        with:
          name: release-criteria
          path: release-criteria/

  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    needs: [compute-version, check-release-criteria]
    # Run if pre-release OR if release and criteria passed
    if: always() && needs.compute-version.result == 'success' && (inputs.release_type == 'pre-release' || needs.check-release-criteria.result == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update version in manifest
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          
          # Update manifest.json
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            manifest.version = '$VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2) + '\n');
          "
          
          # Update package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          
          # Update versions.json
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            let versions = {};
            try {
              versions = JSON.parse(fs.readFileSync('versions.json', 'utf8'));
            } catch (e) {}
            versions['$VERSION'] = manifest.minAppVersion;
            fs.writeFileSync('versions.json', JSON.stringify(versions, null, 2) + '\n');
          "
          
          echo "📝 Updated version to $VERSION"

      - name: Build
        run: npm run build

      - name: Create plugin package
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          
          mkdir -p dist/obsidian-pa
          cp main.js dist/obsidian-pa/
          cp manifest.json dist/obsidian-pa/
          
          if [ -f styles.css ]; then
            cp styles.css dist/obsidian-pa/
          else
            echo "/* obsidian-pa styles */" > dist/obsidian-pa/styles.css
          fi
          
          cd dist
          zip -r "obsidian-pa-${VERSION}.zip" obsidian-pa
          
          echo "📦 Package created: obsidian-pa-${VERSION}.zip"

      - name: Download release criteria (if release)
        if: inputs.release_type == 'release'
        uses: actions/download-artifact@v4
        with:
          name: release-criteria
          path: release-criteria/
        continue-on-error: true

      - name: Create Git tag
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.compute-version.outputs.version }}
          name: "v${{ needs.compute-version.outputs.version }}"
          draft: false
          prerelease: ${{ inputs.release_type == 'pre-release' }}
          files: |
            dist/obsidian-pa-${{ needs.compute-version.outputs.version }}.zip
            dist/obsidian-pa/main.js
            dist/obsidian-pa/manifest.json
            dist/obsidian-pa/styles.css
          body: |
            ## obsidian-pa v${{ needs.compute-version.outputs.version }}
            
            ${{ needs.compute-version.outputs.changelog }}
            
            ---
            
            ## Installation
            
            ### Option 1: Download and unzip (Recommended)
            1. Download `obsidian-pa-${{ needs.compute-version.outputs.version }}.zip`
            2. Unzip into your vault's plugins folder: `<vault>/.obsidian/plugins/`
            3. The zip creates the `obsidian-pa/` folder automatically
            4. Reload Obsidian and enable the plugin in Settings → Community plugins
            
            ### Option 2: Manual installation
            1. Create folder: `<vault>/.obsidian/plugins/obsidian-pa/`
            2. Download `main.js`, `manifest.json`, and `styles.css` into that folder
            3. Reload Obsidian and enable the plugin
            
            ---
            
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.latest.outputs.latest || '0.0.0' }}...${{ needs.compute-version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
