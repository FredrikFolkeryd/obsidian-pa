name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Get version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Strip leading 'v' if present
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Extract section for this version from CHANGELOG.md
          # Looks for ## [version] or ## version header and extracts until next ## header
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \\[?${VERSION}\\]?/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md)
            if [ -z "$NOTES" ]; then
              NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
            fi
          else
            NOTES="Release $VERSION"
          fi
          
          # Write to file to preserve formatting
          echo "$NOTES" > /tmp/release-notes.md
          echo "notes_file=/tmp/release-notes.md" >> $GITHUB_OUTPUT

      - name: Create plugin package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          mkdir -p dist/obsidian-pa
          cp main.js dist/obsidian-pa/
          cp manifest.json dist/obsidian-pa/
          cp styles.css dist/obsidian-pa/ 2>/dev/null || echo '/* obsidian-pa styles */' > dist/obsidian-pa/styles.css
          cp scripts/install.sh dist/obsidian-pa/
          chmod +x dist/obsidian-pa/install.sh
          
          cd dist
          zip -r "obsidian-pa-${VERSION}.zip" obsidian-pa
          cp "obsidian-pa-${VERSION}.zip" "obsidian-pa-latest.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') }}
          body_path: ${{ steps.changelog.outputs.notes_file }}
          files: |
            dist/obsidian-pa-${{ steps.version.outputs.version }}.zip
            dist/obsidian-pa-latest.zip
            dist/obsidian-pa/main.js
            dist/obsidian-pa/manifest.json
            dist/obsidian-pa/styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
