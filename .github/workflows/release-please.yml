name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create plugin package
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"

          mkdir -p dist/obsidian-pa
          cp main.js dist/obsidian-pa/
          cp manifest.json dist/obsidian-pa/
          cp styles.css dist/obsidian-pa/ 2>/dev/null || echo '/* obsidian-pa styles */' > dist/obsidian-pa/styles.css
          cp scripts/install.sh dist/obsidian-pa/
          chmod +x dist/obsidian-pa/install.sh

          cd dist
          zip -r "obsidian-pa-${VERSION}.zip" obsidian-pa
          cp "obsidian-pa-${VERSION}.zip" "obsidian-pa-latest.zip"

      - name: Upload release artifacts
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/obsidian-pa-${{ needs.release-please.outputs.version }}.zip
            dist/obsidian-pa-latest.zip
            dist/obsidian-pa/main.js
            dist/obsidian-pa/manifest.json
            dist/obsidian-pa/styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
