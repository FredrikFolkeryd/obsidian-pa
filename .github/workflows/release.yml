name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0-alpha.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create plugin directory structure
        run: |
          mkdir -p dist/obsidian-pa
          cp main.js dist/obsidian-pa/
          cp manifest.json dist/obsidian-pa/
          cp styles.css dist/obsidian-pa/ 2>/dev/null || echo '/* obsidian-pa styles */' > dist/obsidian-pa/styles.css
          # Include install script in the zip
          cp scripts/install.sh dist/obsidian-pa/

      - name: Create release zip
        run: |
          cd dist
          zip -r obsidian-pa-${{ steps.version.outputs.version }}.zip obsidian-pa

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') }}
          files: |
            dist/obsidian-pa-${{ steps.version.outputs.version }}.zip
            dist/obsidian-pa/main.js
            dist/obsidian-pa/manifest.json
            dist/obsidian-pa/styles.css
          body: |
            ## Installation

            ### Option 1: Interactive Installer (Recommended)
            ```bash
            # Download and extract
            curl -L https://github.com/FredrikFolkeryd/obsidian-pa/releases/download/${{ steps.version.outputs.version }}/obsidian-pa-${{ steps.version.outputs.version }}.zip -o /tmp/obsidian-pa.zip
            unzip -o /tmp/obsidian-pa.zip -d /tmp/

            # Run installer (auto-detects your vaults)
            /tmp/obsidian-pa/install.sh
            ```

            ### Option 2: Manual Installation
            1. Download `obsidian-pa-${{ steps.version.outputs.version }}.zip`
            2. Extract to `<vault>/.obsidian/plugins/` (creates `obsidian-pa/` folder)
            3. Reload Obsidian and enable in Settings → Community plugins

            ### Option 3: Individual Files
            Download `main.js`, `manifest.json`, and `styles.css` into `<vault>/.obsidian/plugins/obsidian-pa/`

            ### First-time setup
            1. Go to Settings → Personal Assistant
            2. Click "Sign in with GitHub" to authenticate
            3. Enable AI features and configure which folders to include
            4. Open the chat via ribbon icon or command palette

            ---
            
            **Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
