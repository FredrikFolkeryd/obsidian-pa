name: ✨ Feature Request
description: Suggest a new feature or enhancement for the Obsidian PA plugin
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature!
        Please fill out the form below to help us understand your request.

  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: |
        A clear and concise description of the feature you'd like to see.
      placeholder: Describe the feature...
    validations:
      required: true

  - type: textarea
    id: problem-it-solves
    attributes:
      label: Problem it Solves
      description: |
        What problem does this feature address?
        Why do you need this feature?
      placeholder: Explain the problem this feature would solve...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: |
        How would you like to see this feature implemented?
      placeholder: Describe your proposed solution...
    validations:
      required: false

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: |
        Are there any alternative solutions or features
        you've considered?
      placeholder: Describe alternative solutions...
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: |
        Add any other context, screenshots, or examples about the
        feature request here.
      placeholder: Any other relevant information...
    validations:
      required: false
