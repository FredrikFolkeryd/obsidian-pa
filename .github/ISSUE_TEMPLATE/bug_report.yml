name: 🐛 Bug Report
description: Report a bug in the Obsidian PA plugin
title: "[Bug]: "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: textarea
    id: bug-description
    attributes:
      label: What happened?
      description: Describe the bug and how to reproduce it.
      placeholder: |
        Describe the bug and steps to reproduce...
        
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: What did you expect?
      description: What should have happened?
      placeholder: Expected behavior...
    validations:
      required: true

  - type: textarea
    id: screenshots-logs
    attributes:
      label: Screenshots/Logs
      description: If applicable, add screenshots or logs.
      placeholder: Paste screenshots or logs here...
    validations:
      required: false
