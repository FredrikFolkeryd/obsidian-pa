name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage:
    name: Triage new issue
    runs-on: ubuntu-latest

    steps:
      - name: Add triage label and invoke Copilot
        uses: actions/github-script@v7
        with:
          script: |
            // Add triage label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['triage']
            });

            // Invoke Copilot with triage instructions
            const body = [
              '@copilot Please triage this issue following the instructions in',
              '`.github/instructions/issue-triage.instructions.md`.',
              '',
              'Analyze the issue, check for duplicates, classify it, assess severity',
              '(if applicable), apply the appropriate labels, and recommend the',
              'appropriate agent to handle it.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
